syntax = "proto3";

package metrics.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/amimof/multikube/api/metrics/v1;metrics";

service MetricsService {
  rpc Get(GetRequest) returns (GetResponse) {
    option (google.api.http) = {get: "/api/v1/metrics"};
  }
}

message GetRequest { int32 window_minutes = 1; }

message GetResponse {
  repeated MetricSeries series = 1;
}

message Label {
  string name = 1;
  string value = 2;
}

message MetricBucket {
  google.protobuf.Timestamp start = 1;
  double value = 2;
  int64 count = 3;
  double sum = 4;
}

message MetricSeries {
  string metric = 1;
  string kind = 2;
  repeated Label labels = 3;
  repeated MetricBucket buckets = 4;
}
